name: flutter_pdf_annotations
description: >-
  A Flutter plugin for opening and annotating PDF files natively on iOS and
  Android. Supports freehand drawing, highlighting, image stamping, and saving
  annotated PDFs — all via a native full-screen editor.
version: 1.0.0
homepage: https://github.com/moghoneim-code/flutter_pdf_annotations
repository: https://github.com/moghoneim-code/flutter_pdf_annotations
issue_tracker: https://github.com/moghoneim-code/flutter_pdf_annotations/issues
topics:
  - pdf
  - annotation
  - drawing
  - document

environment:
  sdk: ^3.5.4
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2







dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterPdfAnnotationsPlugin
      android:
        package: com.ghoneim.flutter_pdf_annotations
        pluginClass: FlutterPdfAnnotationsPlugin
